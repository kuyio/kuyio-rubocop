---
plugins:
  - rubocop-rails

# Enables Rails cops.
Rails:
  Enabled: true

# Enforces consistent use of action filter methods.
Rails/ActionFilter:
  Enabled: true
  EnforcedStyle: action

# Checks that Active Record callbacks are declared in the order in which they will be executed.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railsactiverecordcallbacksorder
Rails/ActiveRecordCallbacksOrder:
  Enabled: true

# Enforces that there is only one call to after_commit
# (and its aliases - after_create_commit, after_update_commit, and after_destroy_commit)
# with the same callback name per model.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railsaftercommitoverride
Rails/AfterCommitOverride:
  Enabled: true

# Check that models subclass ApplicationRecord.
Rails/ApplicationRecord:
  Enabled: false

Rails/AttributeDefaultBlockValue: # (new in 2.9)
  Enabled: true

# Enforce using `blank?` and `present?`.
Rails/Blank:
  Enabled: false

# Checks the correct usage of date aware methods, such as `Date.today`,
# `Date.current`, etc.
Rails/Date:
  Enabled: false

# Prefer delegate method for delegations.
# Disabled per https://gitlab.com/gitlab-org/gitlab-ce/issues/35869
Rails/Delegate:
  Enabled: false

# This cop checks dynamic `find_by_*` methods.
Rails/DynamicFindBy:
  Enabled: false

# This cop enforces that 'exit' calls are not used within a rails app.
Rails/Exit:
  Enabled: true
  Exclude:
    - lib/gitlab/upgrader.rb
    - 'lib/backup/**/*'

# Prefer `find_by` over `where.first`.
Rails/FindBy:
  Enabled: true
  Include:
    - 'app/**/*.rb'
    - 'lib/**/*.rb'

# Enforces that ActiveRecord#find is used instead of where.take!, find_by!, and find_by_id!
# to retrieve a single record by primary key when you expect it to be found.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railsfindbyid
Rails/FindById:
  Enabled: true

# Prefer `all.find_each` over `all.find`.
Rails/FindEach:
  Enabled: true

# Prefer has_many :through to has_and_belongs_to_many.
Rails/HasAndBelongsToMany:
  Enabled: true

# This cop is used to identify usages of http methods like `get`, `post`,
# `put`, `patch` without the usage of keyword arguments in your tests and
# change them to use keyword args.
Rails/HttpPositionalArguments:
  Enabled: true

# Checks for the use of `I18n.t` with a locale argument.
Rails/I18nLocaleTexts: # (new in 2.9)
  Enabled: false

# Checks that Active Support’s inquiry method is not used.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railsinquiry
Rails/Inquiry:
  Enabled: true

# Enforces that mailer names end with Mailer suffix.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railsmailername
Rails/MailerName:
  Enabled: true

# Identifies places where defining routes with match can be replaced with a specific HTTP method.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railsmatchroute
Rails/MatchRoute:
  Enabled: true

# Enforces the use of collection.exclude?(obj) over !collection.include?(obj).
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railsnegateinclude
Rails/NegateInclude:
  Enabled: true

# Checks for calls to puts, print, etc.
Rails/Output:
  Enabled: true
  Exclude:
    - lib/gitlab/seeder.rb
    - lib/gitlab/upgrader.rb
    - 'lib/backup/**/*'
    - 'lib/tasks/**/*'

# This cop checks for the use of output safety calls like html_safe and
# raw.
Rails/OutputSafety:
  Enabled: true

# Enforces the use of pluck over map.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railspluck
Rails/Pluck:
  Enabled: true

# Identifies places where pluck is used in where query methods and can be replaced with select.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railspluckinwhere
Rails/PluckInWhere:
  Enabled: true

# Checks for incorrect grammar when using methods like `3.day.ago`.
Rails/PluralizationGrammar:
  Enabled: true

# Enforce using `blank?` and `present?`.
Rails/Present:
  Enabled: false

# Checks for `read_attribute(:attr)` and `write_attribute(:attr, val)`.
Rails/ReadWriteAttribute:
  Enabled: false

# Do not assign relative date to constants.
Rails/RelativeDateConstant:
  Enabled: false

# Looks for inline rendering within controller actions.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railsrenderinline
Rails/RenderInline:
  Enabled: true

# Identifies places where render text: can be replaced with render plain:.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railsrenderplaintext
Rails/RenderPlainText:
  Enabled: true

# Checks the arguments of ActiveRecord scopes.
Rails/ScopeArgs:
  Enabled: true

# Enforces that short forms of I18n methods are used: t instead of translate and l instead of localize.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railsshorti18n
Rails/ShortI18n:
  Enabled: true

# Checks SQL heredocs to use .squish.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railssquishedsqlheredocs
Rails/SquishedSQLHeredocs:
  Enabled: true

# This cop checks for the use of Time methods without zone.
Rails/TimeZone:
  Enabled: false

# Checks for the use of exit statements (namely return, break and throw) in
# transactions. This is due to the eventual unexpected behavior when using
# ActiveRecord >= 7, where transactions exited using these statements are being
# rollbacked rather than committed (pre ActiveRecord 7 behavior).
Rails/TransactionExitStatement:
  Enabled: true

# This cop checks for the use of old-style attribute validation macros.
Rails/Validation:
  Enabled: true

Rails/WhereEquals: # (new in 2.9)
  Enabled: true

# Enforces consistent style when using exists?.
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railswhereexists
Rails/WhereExists:
  Enabled: true

# Identifies places where manually constructed SQL in where can be replaced with where.not(...).
# https://docs.rubocop.org/rubocop-rails/2.8/cops_rails.html#railswherenot
Rails/WhereNot:
  Enabled: true

# Use flash.now instead of flash before render
Rails/ActionControllerFlashBeforeRender:
  Enabled: true

# Use ActionDispatch::IntegrationTest instead of ActionController::TestCase
Rails/ActionControllerTestCase:
  Enabled: true

# Enforce consistent ordering of controller actions
Rails/ActionOrder:
  Enabled: false

# Use ActiveSupport.on_load for monkey-patching framework classes
Rails/ActiveSupportOnLoad:
  Enabled: true

# Migrations shouldn't use index key in add_column
Rails/AddColumnIndex:
  Enabled: true

# Use compact_blank instead of reject(&:blank?)
Rails/CompactBlank:
  Enabled: true

# Avoid dangerous column names
Rails/DangerousColumnNames:
  Enabled: true

# Avoid manipulating ActiveModel errors hash directly
Rails/DeprecatedActiveModelErrorsMethods:
  Enabled: true

# Use dot-separated keys over scope in I18n
Rails/DotSeparatedKeys:
  Enabled: true

# Don't repeat associations in a model
Rails/DuplicateAssociation:
  Enabled: true

# Scopes sharing same expression
Rails/DuplicateScope:
  Enabled: true

# Don't use duration as arithmetic operand with Time.current
Rails/DurationArithmetic:
  Enabled: true

# Avoid eager log message evaluation
Rails/EagerEvaluationLogMessage:
  Enabled: true

# Use positional arguments over keyword arguments for enums
Rails/EnumSyntax:
  Enabled: true

# Use Rails.env.local? instead of development? || test?
Rails/EnvLocal:
  Enabled: true

# Use date range shorthands
Rails/ExpandedDateRange:
  Enabled: true

# Don't memoize find_by
Rails/FindByOrAssignmentMemoization:
  Enabled: true

# Use freeze_time in tests
Rails/FreezeTime:
  Enabled: true

# Use current HTTP status names consistently
Rails/HttpStatusNameConsistency:
  Enabled: true

# Use lazy lookup in controllers/views — too invasive
Rails/I18nLazyLookup:
  Enabled: false

# Use I18n.with_locale instead of I18n.locale=
Rails/I18nLocaleAssignment:
  Enabled: true

# Use append for ignored_columns
Rails/IgnoredColumnsAssignment:
  Enabled: true

# Migration class name should match filename
Rails/MigrationClassName:
  Enabled: true

# No multiple paths per route (deprecated)
Rails/MultipleRoutePaths:
  Enabled: true

# Use keyword arguments for order
Rails/OrderArguments:
  Enabled: true

# Detect redundant .all
Rails/RedundantActiveRecordAllMethod:
  Enabled: true

# Redundant presence validation on belongs_to (default since Rails 7)
Rails/RedundantPresenceValidationOnBelongsTo:
  Enabled: true

# Redundant travel_back calls
Rails/RedundantTravelBack:
  Enabled: true

# Use redirect_back_or_to
Rails/RedirectBackOrTo:
  Enabled: true

# Prefer response.parsed_body
Rails/ResponseParsedBody:
  Enabled: true

# Single join instead of chaining on Rails.root
Rails/RootJoinChain:
  Enabled: true

# Use Rails.root IO methods instead of passing to File
Rails/RootPathnameMethods:
  Enabled: true

# Use Rails.public_path over Rails.root.join('public')
Rails/RootPublicPath:
  Enabled: true

# select(:col).map(&:col) -> pluck
Rails/SelectMap:
  Enabled: true

# Use squiggly heredoc over strip_heredoc
Rails/StripHeredoc:
  Enabled: true

# Use params.expect (Rails 8)
Rails/StrongParametersExpect:
  Enabled: true

# Warn on nullable booleans
Rails/ThreeStateBooleanColumn:
  Enabled: true

# Use to_fs over to_formatted_s
Rails/ToFormattedS:
  Enabled: true

# Top-level HashWithIndifferentAccess is deprecated
Rails/TopLevelHashWithIndifferentAccess:
  Enabled: true

# to_s(:format) -> to_fs(:format)
Rails/ToSWithArgument:
  Enabled: true

# Unused content in render calls
Rails/UnusedRenderContent:
  Enabled: true

# Use where.missing for finding missing relationships
Rails/WhereMissing:
  Enabled: true

# Use where.not(...) correctly with multiple conditions
Rails/WhereNotWithMultipleConditions:
  Enabled: true

# Use ranges in where
Rails/WhereRange:
  Enabled: true

# Checks for Time.zone assignment
Rails/TimeZoneAssignment:
  Enabled: true
