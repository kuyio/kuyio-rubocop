---
AllCops:
  # New cops will be triaged by style guide maintainers instead.
  NewCops: disable
  # Minimum Ruby version we want to target
  TargetRubyVersion: 3.4
  # Cop names are not displayed in offense messages by default. Change behavior
  # by overriding DisplayCopNames, or by giving the -D/--display-cop-names
  # option.
  DisplayCopNames: true
  # Style guide URLs are not displayed in offense messages by default. Change
  # behavior by overriding DisplayStyleGuide, or by giving the
  # -S/--display-style-guide option.
  DisplayStyleGuide: true
  # Opt out of suggesting extensions
  # see https://docs.rubocop.org/rubocop/extensions.html#extension-suggestions
  SuggestExtensions: false
  # Standard global excludes for all projects
  Exclude:
    - Gemfile.lock
    - vendor/**/*
    - tmp/**/*
    - db/**/*
    - bin/**/*
